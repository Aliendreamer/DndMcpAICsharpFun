services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    volumes:
      - books_data:/books
      - app_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - dnd_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dnd_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dnd_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true   # dev only — remove before any non-local deployment
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin # dev only
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus
    networks:
      - dnd_net
    restart: unless-stopped

  sqlite-web:
    image: coleifer/sqlite-web:latest
    ports:
      - "8080:8080"
    environment:
      - SQLITE_DATABASE=/data/ingestion.db
    volumes:
      - app_data:/data
    depends_on:
      - app
    networks:
      - dnd_net
    restart: unless-stopped

volumes:
  books_data:
  qdrant_data:
  app_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  dnd_net:
    driver: bridge
