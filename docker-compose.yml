services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Admin__ApiKey=${ADMIN_API_KEY}
    volumes:
      - books_data:/books
      - app_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - dnd_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dnd_net
    restart: unless-stopped

volumes:
  books_data:
  qdrant_data:
  app_data:
  ollama_data:

networks:
  dnd_net:
    driver: bridge
