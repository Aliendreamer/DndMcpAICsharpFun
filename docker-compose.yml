# DndMcpAICsharpFun runs ONLY the app (the single host serving the API + MCP server + Blazor UI).
# All infrastructure — Postgres, Qdrant, Ollama, SearXNG — is provided by the shared
# PersonalCommandCenter stack on the external `personalcommandcenter_default` network, where
# those services are reachable by the aliases `postgres`, `qdrant`, `ollama`, `searxng`.
# Bring the shared stack up first; this compose only builds and runs the app.
#
# Shared-infra prerequisites (one-time): the shared Ollama needs `mxbai-embed-large` + `qwen3:8b`
# pulled, and the shared Postgres needs a `dnd` role + `dnd` database (owner dnd).
#
# There is no Marker service here; PDF conversions are served from books/conversion-cache/ and the
# Marker__Url below is only contacted on a cache miss.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - Admin__ApiKey=${ADMIN_API_KEY:-devXXXdev}
      - Qdrant__Host=qdrant
      - Ollama__BaseUrl=http://ollama:11434
      - Marker__Url=http://marker:5002
      - Ingestion__BooksPath=/books
      - SearXNG__Url=http://searxng:8080
      - Mcp__ApiKey=${MCP_API_KEY:-devMcpKey}
      - McpClient__Url=http://localhost:5101/mcp
      - McpClient__ApiKey=${MCP_API_KEY:-devMcpKey}
      - Postgres__Host=postgres
      - Postgres__Password=${POSTGRES_PASSWORD:-dnd}
    volumes:
      - ./books:/books
      - ./5etools:/app/5etools:ro
      - models_data:/app/models
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5101' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shared
    restart: unless-stopped

volumes:
  models_data:

networks:
  shared:
    name: personalcommandcenter_default
    external: true
