# Production compose — runs ONLY the app (the single host serving the API + MCP server + Blazor UI).
# All infrastructure — Postgres, Qdrant, Ollama, SearXNG, MinerU — plus observability
# (Prometheus, Grafana, OTel collector) is provided by the shared PersonalCommandCenter stack
# on the external `personalcommandcenter_default` network, where those services are reachable by
# the aliases `postgres`, `qdrant`, `ollama`, `searxng`, `mineru`. Bring the shared stack up first;
# this compose only builds and runs the app.
#
# Differs from docker-compose.yml (dev) only in: ASPNETCORE_ENVIRONMENT defaults to Production,
# secrets are required (no dev fallbacks), and books lives in the `books_data` named volume
# (populated via the admin upload API) rather than a host bind mount.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      # Admin/Mcp/McpClient API keys come from the (git-crypt) Config/appsettings.Production.json —
      # no env injection. (Injecting an unset ${ADMIN_API_KEY} would override those to an empty
      # string and break auth, so it's deliberately omitted.)
      - Qdrant__Host=qdrant
      - Ollama__BaseUrl=http://ollama:11434
      - Ingestion__BooksPath=/books
      - SearXNG__Url=http://searxng:8080
      - McpClient__Url=http://localhost:5101/mcp
      - Postgres__Host=postgres
      - Postgres__Password=${POSTGRES_PASSWORD}
    volumes:
      # 5etools data is required for import/backfill/enrichment; without it those paths silently
      # no-op (COR-23). Mount the repo's 5etools/ read-only into the image's expected location.
      - books_data:/books
      - ./5etools:/app/5etools:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5101/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shared
    restart: unless-stopped

volumes:
  books_data:

networks:
  shared:
    name: personalcommandcenter_default
    external: true
