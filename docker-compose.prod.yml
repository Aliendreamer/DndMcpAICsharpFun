services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Qdrant__Host=qdrant
      - Ollama__BaseUrl=http://ollama:11434
      - Ingestion__BooksPath=/books
      - Ingestion__DatabasePath=/data/ingestion.db
      - SearXNG__Url=http://searxng:8080
      - Mcp__ApiKey=${MCP_API_KEY}
      - McpClient__Url=http://localhost:5101/mcp
      - McpClient__ApiKey=${MCP_API_KEY}
    volumes:
      - books_data:/books
      - app_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      marker:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - dnd_net
    restart: unless-stopped

  marker:
    build:
      context: ./docker/marker
      dockerfile: Dockerfile
    volumes:
      - books_data:/books:ro
      - marker_models:/root/.cache/datalab
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, json; r=urllib.request.urlopen('http://localhost:5002/health', timeout=5); d=json.loads(r.read()); exit(0 if d.get('models_loaded') else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    networks:
      - dnd_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333 && echo > /dev/tcp/localhost/6334' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull mxbai-embed-large"]
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - dnd_net
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dnd_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus
    networks:
      - dnd_net
    restart: unless-stopped

  sqlite-web:
    image: coleifer/sqlite-web:latest
    ports:
      - "8080:8080"
    environment:
      - SQLITE_DATABASE=/data/ingestion.db
    volumes:
      - app_data:/data
    depends_on:
      - app
    networks:
      - dnd_net
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - dnd_net
    restart: unless-stopped

volumes:
  books_data:
  marker_models:
  qdrant_data:
  app_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  dnd_net:
    driver: bridge
