services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Qdrant__Host=qdrant
      - Ollama__BaseUrl=http://ollama:11434
      - Ingestion__BooksPath=/books
      - SearXNG__Url=http://searxng:8080
      - Mcp__ApiKey=${MCP_API_KEY}
      - McpClient__Url=http://localhost:5101/mcp
      - McpClient__ApiKey=${MCP_API_KEY}
      - Postgres__Host=postgres
      - Postgres__Password=${POSTGRES_PASSWORD}
    volumes:
      - books_data:/books
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      mineru:
        condition: service_healthy
    networks:
      - dnd_net
    restart: unless-stopped

  mineru:
    build:
      context: ./docker/mineru
      dockerfile: Dockerfile
    # MinerU PDF structure parser (pipeline + OCR). The app POSTs PDFs to mineru:8000/file_parse.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    shm_size: '8gb'
    environment:
      MINERU_MODEL_SOURCE: local
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    networks:
      - dnd_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333 && echo > /dev/tcp/localhost/6334' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dnd_net
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull mxbai-embed-large"]
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - dnd_net
    restart: "no"

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=dnd
      - POSTGRES_USER=dnd
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd -d dnd"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dnd_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - dnd_net
    restart: unless-stopped

volumes:
  books_data:
  qdrant_data:
  postgres_data:
  ollama_data:

networks:
  dnd_net:
    driver: bridge
