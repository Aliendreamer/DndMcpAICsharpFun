global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dnd-app
    scrape_interval: 15s
    static_configs:
      - targets: ['app:5101']
    metrics_path: /metrics

  - job_name: qdrant
    scrape_interval: 15s
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
